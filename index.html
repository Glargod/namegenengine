<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Wrangler Name Generator</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      max-width: 1000px;
      margin: 20px auto;
      padding: 20px;
      background-color: #0f0f1a;
      color: #e0e0ff;
    }
    h1 {
      text-align: center;
      color: #00ffcc;
    }
    #output {
      width: 100%;
      height: 600px;
      border: 2px solid #00ffcc;
      overflow-y: auto;
      padding: 15px;
      background-color: #1a1a2e;
      font-family: monospace;
      font-size: 16px;
      line-height: 1.5;
      box-sizing: border-box;
      white-space: pre-wrap;
    }
    .controls {
      text-align: center;
      margin: 15px 0;
    }
    button {
      margin: 8px;
      padding: 12px 24px;
      font-size: 16px;
      background-color: #00ffcc;
      color: #0f0f1a;
      border: none;
      border-radius: 4px;
      cursor: pointer;
    }
    button:hover {
      background-color: #00ccaa;
    }
    #iteration {
      font-weight: bold;
      color: #ffcc00;
    }
    .status {
      text-align: center;
      margin: 10px 0;
      font-size: 14px;
    }
  </style>
</head>
<body>
  <h1>Wrangler Name Generator v10.0</h1>
  <p style="text-align: center;">Iteration: <span id="iteration">0</span></p>
  
  <div class="controls">
    <button onclick="toggleGeneration()">Start / Pause</button>
    <button onclick="clearOutput()">Clear Output</button>
  </div>

  <div class="status" id="status">Press SPACEBAR to pause/resume</div>

  <div id="output"></div>

  <script>
    // Data structures
    const prefixes = ["Eld", "Var", "Lor", "Thal", "Gal", "Ar", "Fen", "Vel", "Dur", "Nor", "Kor", "Sylv", "Myth", "Drak"];
    const suffixes = ["on", "ar", "eth", "iel", "or", "is", "an", "ir", "ul", "en", "orath", "vorn"];
    const titles = ["Lord", "Baron", "Sir", "Chief", "Warden", "Ranger", "Sage", "Knight", "Drift", "Shadow", "Storm"];
    
    const vowels = ["a", "e", "i", "o", "u", "y"];
    const consonants = ["b", "c", "d", "f", "g", "h", "j", "k", "l", "m", "n", "p", "q", "r", "s", "t", "v", "w", "x", "z"];

    const oddities = [
      { oddity: "nn", approvalRate: 40 },
      { oddity: "ll", approvalRate: 35 },
      { oddity: "tt", approvalRate: 25 },
      { oddity: "ss", approvalRate: 45 },
      { oddity: "th", approvalRate: 85 },
      { oddity: "sh", approvalRate: 90 },
      { oddity: "rr", approvalRate: 70 },
      { oddity: "lf", approvalRate: 40 },
      { oddity: "thr", approvalRate: 55 },
      { oddity: "dr", approvalRate: 60 }
    ];

    // Global variables
    let iteration = 0;
    let isRunning = false;
    let intervalId = null;
    const outputDiv = document.getElementById('output');
    const iterationSpan = document.getElementById('iteration');
    const statusDiv = document.getElementById('status');

    // Setup
    function setup() {
      outputDiv.innerHTML = "Wrangler Name Generator v10.0 - Fantasy Name Engine Online<br><br>";
      iteration = 0;
      iterationSpan.textContent = iteration;
    }

    // Approve oddity based on rate
    function approveOddity(index) {
      return Math.random() * 100 < oddities[index].approvalRate;
    }

    // Generate a single fantasy name
    function generateName() {
      let nameArray = [];
      let pos = 0;

      // Optional Title
      if (Math.random() * 100 < 15) {
        const title = titles[Math.floor(Math.random() * titles.length)];
        nameArray.push(...title.split(''), ' ');
        pos += title.length + 1;
      }

      // First part of the name
      pos = generateBaseName(nameArray, 22);

      // Optional compound / "of" part
      if (Math.random() * 100 < 25 && pos < 28) {
        nameArray.push(' ');
        if (Math.random() * 100 < 35) {
          nameArray.push('o', 'f', ' ');
          const place = prefixes[Math.floor(Math.random() * prefixes.length)];
          nameArray.push(...place.split(''));
        } else {
          generateBaseName(nameArray, 32);
        }
      }

      const name = nameArray.join('').trim();
      
      iteration++;
      iterationSpan.textContent = iteration;

      // Add to output
      const nameElement = document.createElement('div');
      nameElement.textContent = name;
      outputDiv.appendChild(nameElement);

      // Auto-scroll
      outputDiv.scrollTop = outputDiv.scrollHeight;
    }

    // Core name generation logic
    function generateBaseName(nameArray, maxLen) {
      let pos = nameArray.length;

      // Optional prefix
      if (Math.random() * 100 < 20 && pos < maxLen - 4) {
        const prefix = prefixes[Math.floor(Math.random() * prefixes.length)];
        nameArray.push(...prefix.split(''));
        pos += prefix.length;
      }

      const syllables = Math.floor(Math.random() * 3) + 2; // 2 to 4 syllables

      for (let i = 0; i < syllables && pos < maxLen - 1; i++) {
        if (pos < maxLen - 1) {
          nameArray.push(consonants[Math.floor(Math.random() * consonants.length)]);
          pos++;
        }
        if (pos < maxLen - 1) {
          nameArray.push(vowels[Math.floor(Math.random() * vowels.length)]);
          pos++;
        }
        if (Math.random() * 100 < 4 && pos < maxLen - 1) {
          nameArray.push("'");
          pos++;
        }
        if (Math.random() * 100 < 12 && pos < maxLen - 4) {
          const oddityIndex = Math.floor(Math.random() * oddities.length);
          if (approveOddity(oddityIndex)) {
            const oddity = oddities[oddityIndex].oddity;
            nameArray.push(...oddity.split(''));
            pos += oddity.length;
          } else {
            nameArray.push(consonants[Math.floor(Math.random() * consonants.length)]);
            pos++;
          }
        }
      }

      // Optional suffix
      if (Math.random() * 100 < 25 && pos < maxLen - 5) {
        const suffix = suffixes[Math.floor(Math.random() * suffixes.length)];
        nameArray.push(...suffix.split(''));
        pos += suffix.length;
      }

      return pos;
    }

    // Toggle generation with Spacebar support
    function toggleGeneration() {
      if (isRunning) {
        clearInterval(intervalId);
        intervalId = null;
        isRunning = false;
        statusDiv.textContent = "PAUSED - Press SPACEBAR or click button to resume";
      } else {
        if (!intervalId) {
          intervalId = setInterval(() => {
            generateName();
          }, 30); // Fast but smooth generation (~33 names per second)
        }
        isRunning = true;
        statusDiv.textContent = "Running... Press SPACEBAR to pause";
      }
    }

    // Clear everything
    function clearOutput() {
      clearInterval(intervalId);
      intervalId = null;
      isRunning = false;
      outputDiv.innerHTML = "";
      iteration = 0;
      iterationSpan.textContent = iteration;
      setup();
      statusDiv.textContent = "Press SPACEBAR to pause/resume";
    }

    // Keyboard support - Spacebar to pause/resume
    document.addEventListener('keydown', function(e) {
      if (e.key === " ") {
        e.preventDefault(); // Prevent page scrolling
        toggleGeneration();
      }
    });

    // Initialize
    setup();
  </script>
</body>
</html>
