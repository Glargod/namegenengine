<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Glargod's Namegen Engine</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      max-width: 100%;
      margin: 10px auto;
      padding: 10px;
      background-color: #0a0a14;
      color: #e0e0ff;
      box-sizing: border-box;
    }
    h1 {
      text-align: center;
      color: #00ffcc;
      font-size: 1.8rem;
      margin: 10px 0 5px;
    }
    .subtitle {
      text-align: center;
      color: #ffcc00;
      font-size: 14px;
      margin-bottom: 15px;
    }
    .controls, .customize {
      text-align: center;
      margin: 15px 0;
      padding: 12px;
      background-color: #1a1a2e;
      border: 1px solid #00ffcc;
      border-radius: 6px;
    }
    button {
      padding: 10px 16px;
      font-size: 15px;
      background-color: #00ffcc;
      color: #0a0a14;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      margin: 5px;
    }
    button:hover { background-color: #00ccaa; }
    select, input[type="range"] {
      padding: 8px;
      font-size: 15px;
      margin: 5px;
    }
    label { margin: 0 8px; }

    #output {
      width: 100%;
      height: 480px;
      border: 2px solid #00ffcc;
      overflow-y: auto;
      padding: 12px;
      background-color: #1a1a2e;
      font-family: monospace;
      font-size: 15.5px;
      line-height: 1.55;
      margin-bottom: 15px;
      word-break: break-all;
    }
    .name-line {
      cursor: pointer;
      padding: 3px 6px;
      border-radius: 3px;
    }
    .name-line:hover { background-color: #2a2a44; }
    .name-line.copied { background-color: #00aa77; color: white; }

    #favorites {
      width: 100%;
      max-height: 180px;
      overflow-y: auto;
      border: 1px solid #ffcc00;
      padding: 10px;
      background-color: #1a1a2e;
      font-family: monospace;
      font-size: 15px;
    }
    .fav-item {
      cursor: pointer;
      padding: 4px 6px;
      margin: 2px 0;
      border-radius: 3px;
      word-break: break-all;
    }
    .fav-item:hover { background-color: #2a2a44; }

    .status {
      text-align: center;
      margin: 10px 0;
      font-size: 14px;
      color: #88ffaa;
    }

    @media (max-width: 480px) {
      button { min-width: 100px; padding: 9px 12px; }
      #output { height: 420px; font-size: 14.5px; }
    }
  </style>
</head>
<body>
  <h1>Glargod's Namegen Engine</h1>
  <p class="subtitle">v11.1 — Tandy 1000 legacy edition with Customize</p>

  <div class="controls">
    <button onclick="toggleGeneration()">Start / Pause</button>
    <button onclick="generateBurst(10)">+10 Burst</button>
    <button onclick="generateBurst(50)">+50 Burst</button>
    <button onclick="clearOutput()">Clear Output</button>
    
    <label>Speed:
      <select id="speedSelect" onchange="updateSpeed()">
        <option value="80">Slow</option>
        <option value="30" selected>Normal</option>
        <option value="8">Fast</option>
      </select>
    </label>
  </div>

  <!-- Customize Panel -->
  <div class="customize">
    <strong>Customize:</strong><br>
    <label>Max Base Length: <span id="maxLenValue">14</span></label>
    <input type="range" id="maxLength" min="8" max="22" value="14" oninput="updateMaxLength(this.value)">
    
    <br>
    <label><input type="checkbox" id="useTitles" checked> Titles (Lord, Sir...)</label>
    <label><input type="checkbox" id="useOf" checked> "of XXX"</label>
    <label><input type="checkbox" id="useSecondName" checked> Second Name</label>
  </div>

  <div class="status" id="status">Ready — Press SPACEBAR or click Start</div>
  <div id="output"></div>

  <h2 style="color:#ffcc00; margin-top:25px;">⭐ Favorites
    <button onclick="copyAllFavorites()" style="font-size:13px;padding:5px 12px;">Copy All</button>
    <button onclick="clearFavorites()" style="font-size:13px;padding:5px 12px;">Clear</button>
  </h2>
  <div id="favorites"></div>

  <script>
    // ==================== DATA ====================
    const prefixes = ["Eld","Var","Lor","Thal","Gal","Ar","Fen","Vel","Dur","Nor","Kor","Sylv","Myth","Drak","Riven","Kael","Thorne","Bael","Zor","Myr","Ael","Vael","Dorn","Gald","Hal","Ith","Jor","Kyr","Lir","Mael","Nym","Orin","Pael","Quor","Rath","Syl","Tarn","Uld","Vorn","Wyr","Xal","Yor","Zeth"];
    const suffixes = ["on","ar","eth","iel","or","is","an","ir","ul","en","orath","vorn","thar","mir","lyn","drel","vor","karn","dor","fel","grim","har","ith","kesh","lor","mal","nir","oril","phel","quar","reth","sarn","tor","uth","vyr","weth","xar","yrel","zorn"];
    const titles = ["Lord","Baron","Sir","Chief","Warden","Ranger","Sage","Knight","Drift","Shadow","Storm","High","Void","Iron","Frost","Blood","Moon","Star","Dawn","Dusk","Rune","Blade","Flame","Ash","Ember"];
    const vowels = ["a","e","i","o","u","y","ae","ai","ea","eo","ia","io","oa","ui"];
    const consonants = ["b","c","d","f","g","h","j","k","l","m","n","p","q","r","s","t","v","w","x","z","th","sh","ch","ph","br","dr","fr","gr","kr","pr","str","tr","vr","wr"];
    const oddities = [{odd: "nn", rate: 35},{odd: "ll", rate: 40},{odd: "rr", rate: 50},{odd: "th", rate: 85},{odd: "sh", rate: 90},{odd: "dr", rate: 60},{odd: "kr", rate: 45},{odd: "ss", rate: 30},{odd: "lf", rate: 35},{odd: "thr", rate: 55},{odd: "nd", rate: 70},{odd: "ng", rate: 65},{odd: "st", rate: 75}];

    // ==================== GLOBALS ====================
    let isRunning = false;
    let intervalId = null;
    let currentSpeed = 30;
    let maxBaseLength = 14;           // Default
    let useTitles = true;
    let useOf = true;
    let useSecondName = true;

    const outputDiv = document.getElementById('output');
    const favoritesDiv = document.getElementById('favorites');
    const statusDiv = document.getElementById('status');
    let favorites = JSON.parse(localStorage.getItem('namegen_favorites') || '[]');

    function setup() {
      outputDiv.innerHTML = "Glargod's Namegen Engine v11.1 — Now with Customize!<br><br>";
      renderFavorites();
    }

    function approveOddity() {
      const idx = Math.floor(Math.random() * oddities.length);
      return Math.random() * 100 < oddities[idx].rate ? oddities[idx].odd : null;
    }

    function generateBaseName() {
      let nameArray = [];
      if (Math.random() < 0.25) nameArray.push(prefixes[Math.floor(Math.random() * prefixes.length)]);

      const syllables = Math.floor(Math.random() * 3) + 2;

      for (let i = 0; i < syllables; i++) {
        nameArray.push(consonants[Math.floor(Math.random() * consonants.length)]);
        nameArray.push(vowels[Math.floor(Math.random() * vowels.length)]);
        if (Math.random() < 0.07) nameArray.push("'");
        if (Math.random() < 0.18) {
          const odd = approveOddity();
          if (odd) nameArray.push(odd);
        }
      }
      if (Math.random() < 0.35) nameArray.push(suffixes[Math.floor(Math.random() * suffixes.length)]);

      let name = nameArray.join('');
      return name.length > maxBaseLength ? name.substring(0, maxBaseLength) : name;
    }

    function generateName() {
      let nameParts = [];

      if (useTitles && Math.random() < 0.18) {
        nameParts.push(titles[Math.floor(Math.random() * titles.length)] + " ");
      }

      nameParts.push(generateBaseName());

      if (useOf && Math.random() < 0.18) {
        nameParts.push(" of ");
        nameParts.push(prefixes[Math.floor(Math.random() * prefixes.length)]);
      } 
      else if (useSecondName && Math.random() < 0.10) {
        nameParts.push(" ");
        nameParts.push(generateBaseName());
      }

      const fullName = nameParts.join('').trim();
      addNameToOutput(fullName);
    }

    function addNameToOutput(name) {
      const line = document.createElement('div');
      line.className = 'name-line';
      line.textContent = name;
      line.onclick = () => copyName(line, name);
      outputDiv.appendChild(line);
      outputDiv.scrollTop = outputDiv.scrollHeight;
    }

    function copyName(element, name) {
      navigator.clipboard.writeText(name).then(() => {
        const original = element.textContent;
        element.textContent = "✅ Copied: " + name;
        element.classList.add('copied');
        setTimeout(() => {
          element.textContent = original;
          element.classList.remove('copied');
        }, 1200);
      });
    }

    // ==================== CONTROLS ====================
    function toggleGeneration() {
      if (isRunning) {
        clearInterval(intervalId);
        isRunning = false;
        statusDiv.textContent = "PAUSED — Press SPACE or click Start/Pause";
      } else {
        isRunning = true;
        statusDiv.textContent = "Generating... (SPACE to pause)";
        intervalId = setInterval(generateName, currentSpeed);
      }
    }

    function updateSpeed() {
      currentSpeed = parseInt(document.getElementById('speedSelect').value);
      if (isRunning) {
        clearInterval(intervalId);
        intervalId = setInterval(generateName, currentSpeed);
      }
    }

    function updateMaxLength(value) {
      maxBaseLength = parseInt(value);
      document.getElementById('maxLenValue').textContent = value;
    }

    // Update checkboxes
    document.getElementById('useTitles').addEventListener('change', (e) => useTitles = e.target.checked);
    document.getElementById('useOf').addEventListener('change', (e) => useOf = e.target.checked);
    document.getElementById('useSecondName').addEventListener('change', (e) => useSecondName = e.target.checked);

    function generateBurst(count) {
      for (let i = 0; i < count; i++) generateName();
    }

    function clearOutput() {
      clearInterval(intervalId);
      isRunning = false;
      outputDiv.innerHTML = "";
      setup();
      statusDiv.textContent = "Output cleared — Ready to generate";
    }

    // ==================== FAVORITES ====================
    function renderFavorites() {
      if (favorites.length === 0) {
        favoritesDiv.innerHTML = "<i>No favorites yet. Click names or double-click output area.</i>";
        return;
      }
      let html = '';
      favorites.forEach(name => {
        html += `<div class="fav-item" onclick="copyNameFromFavorites(this, '${name.replace(/'/g, "\\'")}')">${name}</div>`;
      });
      favoritesDiv.innerHTML = html;
    }

    window.copyNameFromFavorites = function(element, name) {
      navigator.clipboard.writeText(name).then(() => {
        const original = element.textContent;
        element.textContent = "✅ Copied!";
        setTimeout(() => element.textContent = original, 1400);
      });
    };

    function copyAllFavorites() {
      if (favorites.length === 0) return;
      navigator.clipboard.writeText(favorites.join('\n')).then(() => alert('✅ All favorites copied!'));
    }

    function clearFavorites() {
      if (confirm('Clear all favorites?')) {
        favorites = [];
        localStorage.setItem('namegen_favorites', '[]');
        renderFavorites();
      }
    }

    // Keyboard
    document.addEventListener('keydown', e => {
      if (e.key === " ") {
        e.preventDefault();
        toggleGeneration();
      }
    });

    outputDiv.addEventListener('dblclick', () => {
      const lastName = outputDiv.lastChild ? outputDiv.lastChild.textContent.trim() : null;
      if (lastName && !favorites.includes(lastName)) {
        favorites.unshift(lastName);
        if (favorites.length > 80) favorites.pop();
        localStorage.setItem('namegen_favorites', JSON.stringify(favorites));
        renderFavorites();
      }
    });

    // Initialize
    setup();
  </script>
</body>
</html>
